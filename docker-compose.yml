version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: omni_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: omni
      POSTGRES_PASSWORD: omni_secret
      POSTGRES_DB: omni
    volumes:
      - omni_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omni"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omni_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://omni:omni_secret@db:5432/omni
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - omni_uploads:/app/uploads
      - omni_backups:/app/backups

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: omni_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  omni_db_data:
  omni_uploads:
  omni_backups:
